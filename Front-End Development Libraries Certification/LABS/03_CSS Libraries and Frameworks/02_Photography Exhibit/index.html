<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography Exhibit</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="px-4 md:px-32 bg-purple-800 text-yellow-400">
    <main>
      <h1 class="my-10 font-bold text-4xl text-center">Photography Exhibit</h1>
      <div class="main-container grid grid-cols-1 gap-4 | md:grid-cols-3">
        <div class="card rounded-lg p-4 | space-y-4 border-2 border-yellow-400 bg-purple-900">
          <img src="https://cdn.freecodecamp.org/curriculum/labs/colosseo.jpg" alt="The Colosseum" class="rounded-md | w-full h-60 object-cover">
          <h2 class="subheading font-bold text-lg">Colosseum, Rome</h2>
          <p class="description text-sm | leading-2">There is so much history and beauty. The light hits it just right.</p>
          <div class="btns-container flex justify-center gap-2">
            <button class="w-full p-2 rounded-md border-2 border-yellow-400 font-semibold bg-purple-800">Like</button>
            <button class="w-full p-2 rounded-md font-semibold bg-yellow-400 text-purple-900">View Details</button>
          </div>
        </div>
        <div class="card rounded-lg p-4 | space-y-4 border-2 border-yellow-400 bg-purple-900">
          <img src="https://cdn.freecodecamp.org/curriculum/labs/alps.jpg" alt="The Alps" class="rounded-md | w-full h-60 object-cover">
          <h2 class="subheading font-bold text-lg">The Alps</h2>
          <p class="description text-sm | leading-2">The mountains go on forever and the view is breathtaking.</p>
          <div class="btns-container flex justify-center gap-2">
            <button class="w-full p-2 rounded-md border-2 border-yellow-400 font-semibold bg-purple-800">Like</button>
            <button class="w-full p-2 rounded-md font-semibold bg-yellow-400 text-purple-900">View Details</button>
          </div>
        </div>
        <div class="card rounded-lg p-4 | space-y-4 border-2 border-yellow-400 bg-purple-900">
          <img src="https://cdn.freecodecamp.org/curriculum/labs/sea.jpg" alt="A Seascape" class="rounded-md | w-full h-60 object-cover">
          <h2 class="subheading font-bold text-lg">Seascape</h2>
          <p class="description text-sm | leading-2">The water was still, the air was cool and the feeling is pure peace.</p>
          <div class="btns-container flex justify-center gap-2">
            <button class="w-full p-2 rounded-md border-2 border-yellow-400 font-semibold bg-purple-800">Like</button>
            <button class="w-full p-2 rounded-md font-semibold bg-yellow-400 text-purple-900">View Details</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
